<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>⚡ Dopamax — Reset password</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('dopamax-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        var L = { light:1, pastel:1, ocean:1, crimson:1, rose:1, sand:1, mono:1, minimalism:1 };
        document.documentElement.setAttribute('data-mode', L[t] ? 'light' : 'dark');
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='theme-minimal.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='theme-glass.css') }}">
</head>
<body>

<div class="aurora-bg" aria-hidden="true">
  <div class="ab ab1"></div><div class="ab ab2"></div>
  <div class="ab ab3"></div><div class="ab ab4"></div>
</div>

<!-- FloatingLines WebGL background -->
<div class="light-pillar-container" id="floating-lines" aria-hidden="true" style="mix-blend-mode:screen;opacity:0.28;pointer-events:none;z-index:0;"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <h1 style="font-size:1.7rem;margin:0;">Forgot your password?</h1>
      <div style="color:var(--text-muted);font-size:0.82rem;margin-top:6px;">
        Enter your email and we'll send you a reset link.
      </div>
    </div>

    {% if sent %}
    <div class="alert alert-success" style="margin-bottom:18px;">
      ✓ If an account exists for that email, a reset link is on its way. Check your inbox (and spam folder). The link works for 1 hour.
    </div>
    <a href="/login" class="btn btn-primary w-full" style="justify-content:center;">← Back to sign in</a>
    {% else %}
    <form method="POST" action="/forgot">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="margin-top:8px;justify-content:center;">
        Send reset link
      </button>
    </form>
    <div class="auth-footer">
      Remembered it? <a href="/login">Sign in</a>
    </div>
    {% endif %}
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='floatinglines.js') }}"></script>
<script>
(function () {
  var el = document.getElementById('floating-lines');
  if (el && window.initFloatingLines) {
    initFloatingLines(el, {
      enabledWaves: ['top', 'middle', 'bottom'],
      lineCount: [5, 7, 9],
      lineDistance: [9, 7, 5],
      linesGradient: ['#4cc9f0', '#8b7cf6', '#c084fc', '#f472b6'],
      bendRadius: 5.0, bendStrength: -0.5, interactive: false, parallax: false, animationSpeed: 0.55
    });
  }
})();
</script>

</body>
</html>
