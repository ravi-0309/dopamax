{% extends 'base.html' %}

{% block content %}

<div class="page-header">
  <div>
    <div class="page-title">✏️ Edit Course</div>
    <div class="page-subtitle">Update course details</div>
  </div>
  <a href="/courses" class="btn btn-ghost">← Back to Courses</a>
</div>

<div class="card" style="max-width:520px;">
  <div class="card-header">
    <div class="card-title">🎓 Course Details</div>
  </div>

  <form action="/save_course/{{ course[0] }}" method="POST">

    <div class="form-group">
      <label class="form-label">Course Title</label>
      <input type="text" name="title" value="{{ course[2] }}" required>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Total Lectures</label>
        <input type="number" name="total_lectures" value="{{ course[3] }}" required min="1">
      </div>
      <div class="form-group">
        <label class="form-label">⚡ Dopamine / Lecture</label>
        <input type="number" step="0.1" name="dopamine_per_lecture" value="{{ course[5] }}" required min="0.1">
      </div>
    </div>

    <div style="display:flex; gap:12px; margin-top:8px;">
      <button type="submit" class="btn btn-primary">💾 Save Changes</button>
      <a href="/courses" class="btn btn-ghost">Cancel</a>
    </div>

  </form>
</div>

{% endblock %}
