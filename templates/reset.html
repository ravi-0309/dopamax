<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>⚡ Dopamax — Set new password</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('dopamax-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        var L = { light:1, pastel:1, ocean:1, crimson:1, rose:1, sand:1, mono:1, minimalism:1 };
        document.documentElement.setAttribute('data-mode', L[t] ? 'light' : 'dark');
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='theme-minimal.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='theme-glass.css') }}">
</head>
<body>

<div class="aurora-bg" aria-hidden="true">
  <div class="ab ab1"></div><div class="ab ab2"></div>
  <div class="ab ab3"></div><div class="ab ab4"></div>
</div>

<!-- FloatingLines WebGL background -->
<div class="light-pillar-container" id="floating-lines" aria-hidden="true" style="mix-blend-mode:screen;opacity:0.28;pointer-events:none;z-index:0;"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <h1 style="font-size:1.7rem;margin:0;">Set a new password</h1>
    </div>

    {% if done %}
    <div class="alert alert-success" style="margin-bottom:18px;">
      ✓ Your password has been updated. You can sign in now.
    </div>
    <a href="/login" class="btn btn-primary w-full" style="justify-content:center;">Go to sign in →</a>

    {% elif valid %}
    {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
    <form method="POST" action="/reset/{{ token }}">
      <div class="form-group">
        <label class="form-label">New password</label>
        <input type="password" name="password" placeholder="Min. 6 characters" autocomplete="new-password" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm new password</label>
        <input type="password" name="confirm_password" placeholder="••••••••" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="margin-top:8px;justify-content:center;">
        Update password
      </button>
    </form>

    {% else %}
    <div class="alert alert-error" style="margin-bottom:18px;">
      This reset link is invalid or has expired. Reset links last 1 hour and can only be used once.
    </div>
    <a href="/forgot" class="btn btn-primary w-full" style="justify-content:center;">Request a new link</a>
    {% endif %}
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="{{ url_for('static', filename='floatinglines.js') }}"></script>
<script>
(function () {
  var el = document.getElementById('floating-lines');
  if (el && window.initFloatingLines) {
    initFloatingLines(el, {
      enabledWaves: ['top', 'middle', 'bottom'],
      lineCount: [5, 7, 9],
      lineDistance: [9, 7, 5],
      linesGradient: ['#4cc9f0', '#8b7cf6', '#c084fc', '#f472b6'],
      bendRadius: 5.0, bendStrength: -0.5, interactive: false, parallax: false, animationSpeed: 0.55
    });
  }
})();
</script>

</body>
</html>
