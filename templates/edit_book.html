{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">✏️ Edit Book</div>
    <div class="page-subtitle">Update book details</div>
  </div>
  <a href="/books" class="btn btn-ghost">← Back to Books</a>
</div>
<div class="card" style="max-width:520px;">
  <div class="card-header">
    <div class="card-title">📚 Book Details</div>
  </div>
  {# Columns: 0=id, 1=user_id, 2=title, 3=total_pages, 4=current_page, 5=dopamine_per_page, 6=completed #}
  <form action="/save_book/{{ book[0] }}" method="POST">
    <div class="form-group">
      <label class="form-label">Book Title</label>
      <input type="text" name="title" value="{{ book[2] }}" required>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Total Pages</label>
        <input type="number" name="total_pages" value="{{ book[3] }}" required min="1">
      </div>
      <div class="form-group">
        <label class="form-label">⚡ Dopamine / Page</label>
        <input type="number" step="0.1" name="dopamine_per_page" value="{{ book[5] }}" required min="0.1">
      </div>
    </div>
    <div style="display:flex; gap:12px; margin-top:8px;">
      <button type="submit" class="btn btn-primary">💾 Save Changes</button>
      <a href="/books" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
